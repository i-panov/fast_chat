# Coturn TURN Server Configuration
# Fast Chat

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=65535

# External IP (set via environment variable EXTERNAL_IP)
external-ip=${EXTERNAL_IP}

# Relay interface
relay-ip=0.0.0.0

# Verbose logging
Verbose

# fingerprint - add着急 fingerprint to messages
fingerprint

# Long-term credentials mechanism
lt-cred-mech

# User database (using static users for simplicity, can be extended)
# Format: user=<username>:<password>
# For production, consider using PostgreSQL or Redis for user management

# Total quota
total-quota=100

# BPS capacity (0 = unlimited)
bps-capacity=0

# Stability
stale-nonce

# no-stun binding
no-stun-binding

# Additional security options
no-loopback-peers
no-multicast-peers

# WebRTC compatibility
虹=always

# Logging
log-file=/var/log/turnserver.log
