syntax = "proto3";

package signaling;

import "common.proto";

service Signaling {
  rpc CallUser(CallRequest) returns (stream CallEvent);
  rpc AcceptCall(AcceptCallRequest) returns (common.Ack);
  rpc DeclineCall(DeclineCallRequest) returns (common.Ack);
  rpc EndCall(CallEndRequest) returns (common.Ack);
  rpc IceCandidate(ICECandidate) returns (common.Ack);
  
  // Group calls
  rpc JoinGroupCall(JoinGroupCallRequest) returns (stream GroupCallEvent);
  rpc LeaveGroupCall(LeaveGroupCallRequest) returns (common.Ack);
  
  // SFU configuration for group calls
  rpc GetSfuConfig(GetSfuConfigRequest) returns (SfuConfig);
}

message GetSfuConfigRequest {
  string chat_id = 1;
}

message CallRequest {
  string callee_id = 1;
  string chat_id = 2;
  string sdp_offer = 3;
}

message CallEvent {
  oneof event {
    Ringing ringing = 1;
    Accepted accepted = 2;
    Answer answer = 3;
    IceCandidate ice_candidate = 4;
    Ended ended = 5;
    Declined declined = 6;
  }
  
  message Ringing {
    string call_id = 1;
  }
  
  message Accepted {
    string call_id = 1;
    string sdp_offer = 2;
  }
  
  message Answer {
    string call_id = 1;
    string sdp_answer = 2;
  }
  
  message IceCandidate {
    string call_id = 1;
    string candidate = 2;
  }
  
  message Ended {
    string call_id = 1;
  }
  
  message Declined {
    string call_id = 1;
  }
}

message AcceptCallRequest {
  string call_id = 1;
  string sdp_answer = 2;
}

message DeclineCallRequest {
  string call_id = 1;
}

message CallEndRequest {
  string call_id = 1;
}

message ICECandidate {
  string call_id = 1;
  string candidate = 2;
}

message JoinGroupCallRequest {
  string chat_id = 1;
  string sdp_offer = 2;
}

message GroupCallEvent {
  oneof event {
    ParticipantJoined participant_joined = 1;
    ParticipantAnswered participant_answered = 2;
    ParticipantICE participant_ice = 3;
    ParticipantLeft participant_left = 4;
  }
  
  message ParticipantJoined {
    string call_id = 1;
    string user_id = 2;
    string sdp_offer = 3;
  }
  
  message ParticipantAnswered {
    string call_id = 1;
    string user_id = 2;
    string sdp_answer = 3;
  }
  
  message ParticipantICE {
    string call_id = 1;
    string user_id = 2;
    string candidate = 3;
  }
  
  message ParticipantLeft {
    string call_id = 1;
    string user_id = 2;
  }
}

message LeaveGroupCallRequest {
  string call_id = 1;
}

message SfuConfig {
  string url = 1;
  repeated string ice_servers = 2;
}
