syntax = "proto3";

package common;

message Empty {}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  bool is_admin = 4;
  bool totp_enabled = 5;
  bool require_2fa = 6;
  string created_at = 7;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message GetUserRequest {
  string id = 1;
}

message UpdatePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message Setup2FAResponse {
  string secret = 1;
  string qr_code = 2;
}

message Verify2FARequest {
  string code = 1;
}

message Enable2FARequest {
  string code = 1;
}

message Disable2FARequest {
  string code = 1;
}

message BackupCodesResponse {
  repeated string codes = 1;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  bool is_admin = 3;
}

message UpdateUserRequest {
  string id = 1;
  optional string username = 2;
  optional bool disabled = 3;
}

message SetAdminRequest {
  string id = 1;
  bool is_admin = 2;
}

message Ack {
  bool success = 1;
  string message = 2;
}

message FileMetadata {
  string id = 1;
  string original_name = 2;
  string mime_type = 3;
  int64 size_bytes = 4;
  string uploader_id = 5;
  string uploaded_at = 6;
}

message Chat {
  string id = 1;
  bool is_group = 2;
  string name = 3;
  repeated string participants = 4;
  string created_at = 5;
  string created_by = 6;
  bool is_favorites = 7;
}

message Message {
  string id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string encrypted_content = 4;
  string content_type = 5;
  string file_metadata_id = 6;
  string status = 7;
  bool edited = 8;
  bool deleted = 9;
  string created_at = 10;
  string edited_at = 11;
  string topic_id = 12;
  string thread_id = 13;
}
