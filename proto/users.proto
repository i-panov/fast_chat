syntax = "proto3";

package users;

import "common.proto";

service Users {
  rpc GetUser(GetUserRequest) returns (common.User);
  rpc UpdatePassword(UpdatePasswordRequest) returns (common.Ack);

  // 2FA
  rpc Setup2FA(common.Empty) returns (Setup2FAResponse);
  rpc Verify2FASetup(Verify2FARequest) returns (common.Ack);
  rpc Enable2FA(Enable2FARequest) returns (common.Ack);
  rpc Disable2FA(Disable2FARequest) returns (common.Ack);
  rpc GetBackupCodes(common.Empty) returns (BackupCodesResponse);
  rpc RegenerateBackupCodes(common.Empty) returns (BackupCodesResponse);
}

message GetUserRequest {
  string id = 1;
}

message UpdatePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message Setup2FAResponse {
  string secret = 1;
  string qr_code_url = 2;
}

message Verify2FARequest {
  string code = 1;
}

message Enable2FARequest {
  string code = 1;
}

message Disable2FARequest {
  string code = 1;
}

message BackupCodesResponse {
  repeated string codes = 1;
}
